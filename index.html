<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>お買い物シミュレーション</title>
<style>
  :root {
    --bg: #f5f0e6;
    --surface: #ffffff;
    --border: #dcd0ba;
    --text: #4a3f35;
    --sub: #8c7c68;
    --accent: #e67e22;
    --correct: #27ae60;
    --wrong: #e74c3c;
    --wallet-bg: #eaddc5;
    --tray-bg: #faf7f2;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body, html {
    width: 100%; height: 100%;
    font-family: 'Hiragino Maru Gothic ProN', 'BIZ UDPGothic', sans-serif;
    background-color: var(--bg);
    color: var(--text);
    overflow: hidden;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
  }

  #app {
    display: flex;
    flex-direction: column;
    width: 100%; height: 100%;
    position: relative;
  }

  /* 上部：お店エリア */
  #shop-area {
    flex: 0 0 28%;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: #fff;
    border-bottom: 3px dashed var(--border);
    position: relative;
    padding: 0 15px;
    z-index: 10;
  }
  
  .side-actions {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 8px;
    align-items: flex-start;
  }
  
  #item-display {
    flex: 1.5;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  
  .side-spacer {
    flex: 1;
  }

  #item-emoji {
    font-size: 70px;
    line-height: 1;
    filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1));
    transition: transform 0.3s;
  }
  #item-price {
    font-size: 26px;
    font-weight: bold;
    margin-top: 8px;
    background: #fff;
    color: var(--text);
    border: 3px solid var(--text);
    padding: 4px 20px;
    border-radius: 20px;
  }

  .btn {
    padding: 8px 16px;
    border-radius: 20px;
    border: none;
    font-size: 15px;
    font-weight: bold;
    cursor: pointer;
    box-shadow: 0 4px 0 rgba(0,0,0,0.15);
    transition: transform 0.1s, box-shadow 0.1s;
    font-family: inherit;
    width: 110px;
    text-align: center;
  }
  .btn:active {
    transform: translateY(4px);
    box-shadow: 0 0 0 rgba(0,0,0,0);
  }
  .btn-pay { background: var(--correct); color: white; }
  .btn-cancel { background: #e07a70; color: white; }
  .btn-secondary { background: #ecf0f1; color: var(--text); }
  .btn-change { background: #3498db; color: white; }

  /* 中央：トレイ（支払い）エリア */
  #tray-area {
    flex: 0 0 20%;
    background: var(--tray-bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 10px;
    position: relative;
  }
  .tray-box {
    flex: 1;
    width: 100%;
    border: 3px dashed #dcd0ba;
    border-radius: 16px;
    background: rgba(255,255,255,0.6);
  }

  /* 財布エリア */
  #wallet-toolbar {
    background: var(--wallet-bg);
    padding: 6px 15px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-top: 4px solid #c9bca0;
    font-weight: bold;
    color: var(--sub);
  }
  
  .btn-toggle {
    background: #fff;
    border: 2px solid var(--border);
    border-radius: 12px;
    padding: 4px 12px;
    font-size: 14px;
    font-weight: bold;
    color: var(--text);
    cursor: pointer;
    box-shadow: 0 2px 0 rgba(0,0,0,0.1);
  }
  .btn-toggle:active { transform: translateY(2px); box-shadow: 0 0 0; }

  #wallet-area {
    flex: 1;
    background: var(--wallet-bg);
    padding: 10px;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    grid-template-rows: repeat(2, 1fr);
    gap: 10px;
    position: relative;
    overflow: hidden;
  }
  .denom-zone {
    background: rgba(255,255,255,0.4);
    border-radius: 12px;
    border: 2px dashed rgba(0,0,0,0.1);
    position: relative;
    overflow: hidden;
  }
  .denom-label {
    position: absolute;
    bottom: 2px; right: 6px;
    font-size: 14px;
    font-weight: bold;
    color: var(--sub);
    opacity: 0.7;
    pointer-events: none;
  }

  #money-container {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none;
    z-index: 20;
  }
  .money-item {
    position: absolute;
    top: 0; left: 0;
    pointer-events: auto;
    cursor: pointer;
    transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.3s;
    transform-origin: center center;
    display: flex; align-items: center; justify-content: center;
  }
  .money-item svg {
    display: block;
    filter: drop-shadow(0 2px 3px rgba(0,0,0,0.3));
  }
  .money-item:active svg {
    filter: drop-shadow(0 0px 1px rgba(0,0,0,0.4));
    transform: scale(0.95);
  }

  /* フィードバック */
  #feedback-overlay {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,0.5);
    z-index: 90;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
  }
  #feedback-overlay.show {
    opacity: 1;
    pointer-events: auto;
  }
  #feedback {
    background: rgba(255,255,255,0.97);
    padding: 24px 40px;
    border-radius: 30px;
    font-size: 32px;
    font-weight: bold;
    color: var(--text);
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    text-align: center;
    white-space: pre-wrap;
    margin-bottom: 20px;
  }
  #change-btn-container {
    display: none;
  }
  #change-btn-container.visible {
    display: block;
  }

  /* 歯車ボタン */
  #gear-btn {
    position: absolute; top: 10px; right: 10px;
    background: transparent; border: none;
    font-size: 32px; opacity: 0.3;
    cursor: pointer; z-index: 30;
    -webkit-tap-highlight-color: transparent;
  }
  #gear-btn:hover { opacity: 0.6; }

  /* 設定モーダル */
  #settings-modal {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.6);
    display: none; justify-content: center; align-items: center;
    z-index: 200;
  }
  #settings-content {
    background: var(--surface);
    width: 90%; max-width: 500px; max-height: 90%;
    border-radius: 20px;
    padding: 20px;
    overflow-y: auto;
    display: flex; flex-direction: column; gap: 15px;
  }
  .setting-group {
    background: var(--bg); padding: 15px; border-radius: 12px;
  }
  .setting-title { font-weight: bold; margin-bottom: 10px; border-bottom: 2px solid var(--border); padding-bottom: 5px;}
  
  .num-input-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
  .num-input-row input {
    width: 80px; padding: 8px; border-radius: 8px; border: 2px solid var(--border);
    font-size: 16px; text-align: right;
  }
  .wallet-init-grid {
    display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px;
  }
  .wallet-init-item {
    display: flex; align-items: center; justify-content: space-between;
    background: #fff; padding: 5px 10px; border-radius: 8px; border: 1px solid var(--border);
  }
  .wallet-init-item input { width: 50px; text-align: right; border: 1px solid #ccc; border-radius: 4px; padding: 4px; }
  
  #close-settings-btn {
    padding: 12px; background: var(--accent); color: #fff; border: none;
    border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer;
  }
</style>
</head>
<body>

<div id="app">
  <button id="gear-btn" onclick="openSettings()">⚙️</button>

  <!-- お店エリア -->
  <div id="shop-area">
    <div class="side-actions">
      <button class="btn btn-pay" onclick="handlePay()">しはらう</button>
      <button class="btn btn-cancel" onclick="handleCannotBuy()">やめる</button>
      <button class="btn btn-secondary" onclick="openSettings()">もどる</button>
    </div>
    <div id="item-display">
      <div id="item-emoji">🍎</div>
      <div id="item-price">100円</div>
    </div>
    <div class="side-spacer"></div>
  </div>

  <!-- トレイ（支払い）エリア -->
  <div id="tray-area">
    <div class="tray-box"></div>
  </div>

  <!-- 財布ツールバー -->
  <div id="wallet-toolbar">
    <span>さいふのなか</span>
    <button class="btn-toggle" onclick="toggleWalletView()" id="view-toggle-btn">かさなる表示</button>
  </div>

  <!-- 財布エリア -->
  <div id="wallet-area">
    <div class="denom-zone" id="zone-5000"><div class="denom-label">5000円</div></div>
    <div class="denom-zone" id="zone-1000"><div class="denom-label">1000円</div></div>
    <div class="denom-zone" id="zone-500"><div class="denom-label">500円</div></div>
    <div class="denom-zone" id="zone-100"><div class="denom-label">100円</div></div>
    <div class="denom-zone" id="zone-50"><div class="denom-label">50円</div></div>
    <div class="denom-zone" id="zone-10"><div class="denom-label">10円</div></div>
    <div class="denom-zone" id="zone-5"><div class="denom-label">5円</div></div>
    <div class="denom-zone" id="zone-1"><div class="denom-label">1円</div></div>
  </div>

  <!-- 動くお金が入るコンテナ -->
  <div id="money-container"></div>
</div>

<!-- フィードバック（オーバーレイ） -->
<div id="feedback-overlay">
  <div id="feedback"></div>
  <div id="change-btn-container">
    <button class="btn btn-change" style="width:180px; font-size:18px; padding:12px 20px;" onclick="receiveChange()">おつりをもらう</button>
  </div>
</div>

<div id="settings-modal">
  <div id="settings-content">
    <h2 style="text-align: center; color: var(--text);">⚙️ せってい</h2>
    
    <div class="setting-group">
      <div class="setting-title">ほしいものの ネダン</div>
      <div class="num-input-row">
        <span>いちばん やすい:</span>
        <div><input type="number" id="set-min" value="100" step="10"> 円</div>
      </div>
      <div class="num-input-row">
        <span>いちばん たかい:</span>
        <div><input type="number" id="set-max" value="800" step="10"> 円</div>
      </div>
      <div class="num-input-row">
        <span>きざみ (10,50,100...):</span>
        <div><input type="number" id="set-step" value="10" step="10"> 円</div>
      </div>
    </div>

    <div class="setting-group">
      <div class="setting-title">さいしょの おさいふの なかみ</div>
      <div class="wallet-init-grid" id="wallet-init-list">
        <!-- JSで生成 -->
      </div>
    </div>

    <button id="close-settings-btn" onclick="applySettings()">けってい して はじめる</button>
  </div>
</div>

<script>
const EMOJIS = ['🍎','🍌','🍇','🍉','🍔','🍟','🍰','🍩','🍦','🧸','🚗','⚽️','🏀','🎮','📚','🖍','👕','👟','🌻','🌷'];
const DENOMS = [5000, 1000, 500, 100, 50, 10, 5, 1];

// ── SVG生成 ──────────────────────────────────────────────
function coinSVG(val, size) {
  const C = {
    1:   { bg:'#b2b2b2', inner:'#d0d0d0', rim:'#444444', text:'1',   hole:false },
    5:   { bg:'#c8a84b', inner:'#e0c060', rim:'#5a3a00', text:'5',   hole:true  },
    10:  { bg:'#b87333', inner:'#d4946a', rim:'#4a1800', text:'10',  hole:false },
    50:  { bg:'#b0b0b0', inner:'#d0d0d0', rim:'#333333', text:'50',  hole:true  },
    100: { bg:'#a8a8a8', inner:'#c8c8c8', rim:'#2a2a2a', text:'100', hole:false },
    500: { bg:'#a0a8b0', inner:'#c0c8d0', rim:'#1a3060', text:'500', hole:false },
  };
  const c = C[val];
  if(!c) return '';
  const r = size / 2;
  const holeR = size * 0.12;
  const ts = val >= 100 ? size * 0.28 : size * 0.36;
  const textY = c.hole ? r * 0.55 + ts * 0.35 : r + ts * 0.38;
  const hole = c.hole
    ? `<circle cx="${r}" cy="${r}" r="${holeR}" fill="var(--bg)" stroke="${c.rim}" stroke-width="1"/>`
    : '';
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" xmlns="http://www.w3.org/2000/svg">
  <circle cx="${r}" cy="${r}" r="${r-1}" fill="${c.rim}"/>
  <circle cx="${r}" cy="${r}" r="${r-3}" fill="${c.bg}"/>
  <circle cx="${r}" cy="${r}" r="${r-5}" fill="${c.inner}" opacity="0.6"/>
  ${hole}
  <text x="${r}" y="${textY}" text-anchor="middle" font-size="${ts}" font-weight="900" fill="${c.rim}" font-family="sans-serif">${c.text}</text>
</svg>`;
}

function noteSVG(val, w, h) {
  const N = {
    1000: { bg:'#ede0c4', border:'#7a5010', inner:'#f8f0dc', text:'1000' },
    5000: { bg:'#e8ddc0', border:'#5a6820', inner:'#f5ecd4', text:'5000' },
  };
  const c = N[val];
  if(!c) return '';
  const ts = h * 0.38;
  return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg">
  <rect x="1" y="1" width="${w-2}" height="${h-2}" rx="4" fill="${c.border}"/>
  <rect x="3" y="3" width="${w-6}" height="${h-6}" rx="3" fill="${c.bg}"/>
  <rect x="6" y="6" width="${w-12}" height="${h-12}" rx="2" fill="${c.inner}" opacity="0.6"/>
  <circle cx="${w/2}" cy="${h/2}" r="${h*0.3}" fill="#fff" opacity="0.3"/>
  <text x="${w/2}" y="${h*0.65}" text-anchor="middle" font-size="${ts}" font-weight="900" fill="${c.border}" font-family="sans-serif">${c.text}</text>
</svg>`;
}

// ── 状態 ─────────────────────────────────────────────────
let state = {
  settings: {
    priceMin: 100,
    priceMax: 800,
    priceStep: 10,
    initWallet: { 5000:0, 1000:1, 500:2, 100:2, 50:2, 10:4, 5:0, 1:0 }
  },
  moneys: [],
  targetPrice: 0,
  targetItem: '',
  moneyIdCounter: 0,
  walletView: 'stacked',
  pendingChange: 0,    // おつり待機中の金額
  waitingChange: false // おつりボタン表示中フラグ
};

// ── 各金種のサイズを統一して管理 ────────────────────────
// zone のサイズに合わせて後で計算するが、まず基本サイズ定数で全枚数固定
const COIN_SIZE_BASE = 48;  // 硬貨の基本サイズ（全金種共通）
const NOTE_W_BASE   = 72;  // お札の幅
const NOTE_H_BASE   = 40;  // お札の高さ

function getMoneySize(val) {
  if (val >= 1000) {
    return { type:'note', w: NOTE_W_BASE, h: NOTE_H_BASE };
  } else {
    return { type:'coin', w: COIN_SIZE_BASE, h: COIN_SIZE_BASE };
  }
}

// ── 初期化 ───────────────────────────────────────────────
function initApp() {
  buildSettingsUI();
  resetWallet();
  nextQuestion();
  window.addEventListener('resize', renderMoneys);
}

function resetWallet() {
  state.moneys = [];
  state.moneyIdCounter = 0;
  state.pendingChange = 0;
  state.waitingChange = false;
  for (let val of DENOMS) {
    const count = state.settings.initWallet[val] || 0;
    for (let i = 0; i < count; i++) addMoney(val, 'wallet');
  }
}

function addMoney(val, loc) {
  const sz = getMoneySize(val);
  state.moneys.push({
    id: state.moneyIdCounter++,
    val,
    type: sz.type,
    w: sz.w,
    h: sz.h,
    loc,
    zIndex: state.moneyIdCounter
  });
}

// ── 問題 ─────────────────────────────────────────────────
function nextQuestion() {
  const { priceMin: min, priceMax: max, priceStep: step } = state.settings;
  const steps = Math.floor((max - min) / step);
  state.targetPrice = min + Math.floor(Math.random() * (steps + 1)) * step;
  state.targetItem  = EMOJIS[Math.floor(Math.random() * EMOJIS.length)];

  document.getElementById('item-emoji').textContent = state.targetItem;
  document.getElementById('item-price').textContent = state.targetPrice + '円';

  const emojiEl = document.getElementById('item-emoji');
  emojiEl.style.transform = 'scale(1.2) rotate(10deg)';
  setTimeout(() => { emojiEl.style.transform = 'scale(1) rotate(0deg)'; }, 300);

  renderMoneys();
}

// ── 表示切替 ─────────────────────────────────────────────
function toggleWalletView() {
  state.walletView = state.walletView === 'stacked' ? 'grid' : 'stacked';
  const btn = document.getElementById('view-toggle-btn');
  btn.textContent = state.walletView === 'stacked' ? 'かさなる表示' : 'ぜんぶ見える表示';
  renderMoneys();
}

// ── レンダリング ──────────────────────────────────────────
function renderMoneys() {
  const container = document.getElementById('money-container');

  state.moneys.forEach(m => {
    let el = document.getElementById('money-' + m.id);
    if (!el) {
      el = document.createElement('div');
      el.id = 'money-' + m.id;
      el.className = 'money-item';
      el.onclick = () => handleMoneyClick(m.id);

      if (m.type === 'note') {
        el.innerHTML = noteSVG(m.val, m.w, m.h);
      } else {
        el.innerHTML = coinSVG(m.val, m.w);
      }
      el.style.width  = m.w + 'px';
      el.style.height = m.h + 'px';
      container.appendChild(el);
    }

    const pos = calculatePosition(m);
    el.style.transform = `translate(${pos.x}px, ${pos.y}px)`;
    el.style.zIndex = m.zIndex;
    el.style.opacity = '1';
  });

  // 不要な要素を削除
  Array.from(container.children).forEach(el => {
    const id = parseInt(el.id.replace('money-', ''));
    if (!state.moneys.find(m => m.id === id)) el.remove();
  });
}

function calculatePosition(money) {
  const w = money.w;
  const h = money.h;

  if (money.loc === 'wallet') {
    const zone = document.getElementById('zone-' + money.val);
    if (!zone) return { x: 0, y: 0 };
    const rect = zone.getBoundingClientRect();

    const sameDenoms = state.moneys
      .filter(m => m.loc === 'wallet' && m.val === money.val)
      .sort((a, b) => a.id - b.id);
    const index = sameDenoms.findIndex(m => m.id === money.id);

    if (state.walletView === 'stacked') {
      // ゾーン中央に積み重ね
      const baseX = rect.left + (rect.width  - w) / 2;
      const baseY = rect.top  + (rect.height - h) / 2;
      if (money.type === 'note') {
        return { x: baseX, y: baseY - index * 3 };
      } else {
        return { x: baseX - index * 2, y: baseY - index * 3 };
      }
    } else {
      // ぜんぶみえる：ゾーン内に並べる
      const pad = 4;
      const availW = rect.width  - pad * 2;
      const availH = rect.height - pad * 2;

      const cols = Math.max(1, Math.floor(availW / w));
      const row  = Math.floor(index / cols);
      const col  = index % cols;

      const totalRows  = Math.ceil(sameDenoms.length / cols);
      let   rowSpacing = h;
      if (totalRows > 1 && totalRows * h > availH) {
        rowSpacing = (availH - h) / (totalRows - 1);
      }

      const startX = rect.left + pad + (availW - cols * w) / 2;
      const startY = rect.top  + pad;

      return { x: startX + col * w, y: startY + row * rowSpacing };
    }

  } else if (money.loc === 'tray') {
    const tray = document.getElementById('tray-area');
    const rect = tray.getBoundingClientRect();

    const trayMoneys = state.moneys
      .filter(m => m.loc === 'tray')
      .sort((a, b) => a.id - b.id);
    const index = trayMoneys.findIndex(m => m.id === money.id);

    const cols    = Math.max(1, Math.floor((rect.width - 20) / 60));
    const row     = Math.floor(index / cols);
    const col     = index % cols;

    const randX = (money.id * 13 % 16) - 8;
    const randY = (money.id * 17 % 16) - 8;

    let x = rect.left + 20 + col * 60 + randX;
    let y = rect.top  + 10 + row * 50 + randY;

    x = Math.max(rect.left + 5, Math.min(x, rect.right  - w - 5));
    y = Math.max(rect.top  + 5, Math.min(y, rect.bottom - h - 5));

    return { x, y };
  }

  return { x: 0, y: 0 };
}

// ── クリック処理 ─────────────────────────────────────────
function handleMoneyClick(id) {
  const m = state.moneys.find(m => m.id === id);
  if (!m) return;
  m.zIndex = ++state.moneyIdCounter;
  m.loc    = m.loc === 'wallet' ? 'tray' : 'wallet';
  renderMoneys();
}

// ── 合計 ─────────────────────────────────────────────────
function getTotalAmount()     { return state.moneys.reduce((s, m) => s + m.val, 0); }
function getTrayAmount()      { return state.moneys.filter(m => m.loc === 'tray').reduce((s, m) => s + m.val, 0); }

// ── やめる ───────────────────────────────────────────────
function handleCannotBuy() {
  const totalMoney = getTotalAmount();
  if (totalMoney < state.targetPrice) {
    playCorrect();
    showFeedback("せいかい！\nおかねが たりないから\nかえないね");
    state.moneys.forEach(m => m.loc = 'wallet');
    renderMoneys();
    setTimeout(() => { hideFeedback(); nextQuestion(); }, 1800);
  } else {
    playWrong();
    showFeedbackAuto("かえるよ！\nおさいふを よくみて！");
  }
}

// ── しはらう ─────────────────────────────────────────────
function handlePay() {
  const trayTotal = getTrayAmount();
  if (trayTotal === 0) {
    playWrong();
    showFeedbackAuto("おかねを だしてね");
    return;
  }
  if (trayTotal >= state.targetPrice) {
    paymentSuccess(trayTotal - state.targetPrice);
  } else {
    playWrong();
    showFeedbackAuto("たりないよ！");
  }
}

// ── 支払い成功 ────────────────────────────────────────────
function paymentSuccess(changeAmount) {
  playCorrect();

  // トレイのお金を消去アニメーション
  const shopRect = document.getElementById('item-emoji').getBoundingClientRect();
  const targetX  = shopRect.left + shopRect.width  / 2 - 25;
  const targetY  = shopRect.top  + shopRect.height / 2 - 25;

  state.moneys.filter(m => m.loc === 'tray').forEach(m => {
    const el = document.getElementById('money-' + m.id);
    if (el) {
      el.style.transform = `translate(${targetX}px, ${targetY}px) scale(0.2)`;
      el.style.opacity = '0';
    }
  });

  // トレイのお金を削除
  state.moneys = state.moneys.filter(m => m.loc !== 'tray');

  if (changeAmount > 0) {
    // おつりあり → ボタンで受け取り待ち
    state.pendingChange  = changeAmount;
    state.waitingChange  = true;
    showFeedback(`かえたよ！\nおつりは ${changeAmount}円`, true);
  } else {
    // おつりなし
    state.pendingChange = 0;
    state.waitingChange = false;
    showFeedback("かえたよ！");
    setTimeout(() => {
      hideFeedback();
      checkAndNext();
    }, 1500);
  }

  // 少し待ってから不要要素を消す
  setTimeout(() => renderMoneys(), 400);
}

// ── おつりをもらう ────────────────────────────────────────
function receiveChange() {
  const changeMoneys = getChangeDenoms(state.pendingChange);
  changeMoneys.forEach(val => addMoney(val, 'wallet'));
  state.pendingChange = 0;
  state.waitingChange = false;
  hideFeedback();
  renderMoneys();
  setTimeout(() => checkAndNext(), 300);
}

function checkAndNext() {
  if (getTotalAmount() < state.settings.priceMin) {
    showFeedbackAuto("おさいふが\nからっぽになったよ！");
    setTimeout(() => { hideFeedback(); openSettings(); }, 2000);
  } else {
    nextQuestion();
  }
}

function getChangeDenoms(amount) {
  const change = [];
  let remaining = amount;
  for (const d of DENOMS) {
    while (remaining >= d) { change.push(d); remaining -= d; }
  }
  return change;
}

// ── フィードバック表示 ────────────────────────────────────
function showFeedback(msg, showChangeBtn = false) {
  const overlay  = document.getElementById('feedback-overlay');
  const el       = document.getElementById('feedback');
  const changeCt = document.getElementById('change-btn-container');
  el.innerText = msg;
  changeCt.classList.toggle('visible', showChangeBtn);
  overlay.classList.add('show');
}

function showFeedbackAuto(msg) {
  showFeedback(msg, false);
  setTimeout(hideFeedback, 1500);
}

function hideFeedback() {
  document.getElementById('feedback-overlay').classList.remove('show');
}

// ── 音 ───────────────────────────────────────────────────
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;
function getACtx() { if (!audioCtx) audioCtx = new AudioCtx(); return audioCtx; }

function playCorrect() {
  const ctx = getACtx(), t = ctx.currentTime;
  [[1046.50, t], [1318.51, t+0.08], [1567.98, t+0.16]].forEach(([freq, start], i) => {
    const o = ctx.createOscillator(), g = ctx.createGain();
    o.type = 'sine'; o.frequency.value = freq;
    g.gain.setValueAtTime(0, start);
    g.gain.linearRampToValueAtTime(0.3, start + 0.02);
    g.gain.exponentialRampToValueAtTime(0.001, start + (i === 2 ? 0.3 : 0.1));
    o.connect(g); g.connect(ctx.destination);
    o.start(start); o.stop(start + 0.4);
  });
}

function playWrong() {
  const ctx = getACtx(), t = ctx.currentTime;
  const o = ctx.createOscillator(), g = ctx.createGain();
  o.type = 'sawtooth';
  o.frequency.setValueAtTime(300, t);
  o.frequency.exponentialRampToValueAtTime(150, t + 0.3);
  g.gain.setValueAtTime(0, t);
  g.gain.linearRampToValueAtTime(0.2, t + 0.02);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
  o.connect(g); g.connect(ctx.destination);
  o.start(t); o.stop(t + 0.35);
}

// ── 設定UI ────────────────────────────────────────────────
function buildSettingsUI() {
  const list = document.getElementById('wallet-init-list');
  list.innerHTML = '';
  DENOMS.forEach(val => {
    const item = document.createElement('div');
    item.className = 'wallet-init-item';
    item.innerHTML = `
      <span>${val}円</span>
      <div><input type="number" id="init-${val}" value="${state.settings.initWallet[val]}" min="0" max="30"> 枚</div>
    `;
    list.appendChild(item);
  });
}

function openSettings() {
  document.getElementById('settings-modal').style.display = 'flex';
}

function applySettings() {
  let min  = parseInt(document.getElementById('set-min').value)  || 100;
  let max  = parseInt(document.getElementById('set-max').value)  || 800;
  let step = parseInt(document.getElementById('set-step').value) || 10;
  if (min > max) { [min, max] = [max, min]; }
  state.settings.priceMin  = min;
  state.settings.priceMax  = max;
  state.settings.priceStep = step;

  let totalInit = 0;
  DENOMS.forEach(val => {
    const v = parseInt(document.getElementById(`init-${val}`).value) || 0;
    state.settings.initWallet[val] = v;
    totalInit += v;
  });

  if (totalInit === 0) { alert("おさいふに おかねを いれてね！"); return; }

  document.getElementById('settings-modal').style.display = 'none';
  hideFeedback();
  resetWallet();
  nextQuestion();
}

window.addEventListener('load', initApp);
</script>
